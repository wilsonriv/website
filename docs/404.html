<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Wilson Rivera | hi@wilsonrivera.com</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // https://github.com/rafgraph/spa-github-pages
    //
    // GitHub Pages has no server-side routing, so reloading a deep link such
    // as /resume returns a real 404. GitHub serves this 404.html instead, and
    // this script rewrites the request into a query string and redirects to
    // the app root (/), where index.html restores the original URL before
    // Angular bootstraps. Because this file is static (no hashed bundle
    // references) it is copied verbatim by every `ng build` and never goes
    // stale. Custom domain serves the app at the root, so we keep 0 segments.
    var pathSegmentsToKeep = 0;

    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
