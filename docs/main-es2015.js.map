<section class="section" id="work">
  <div class="section__inner">
    <h2 class="section-title">Work Experience</h2>
    <div class="clients-grid">
      <div class="client-card" *ngFor="let client of allClients" [id]="client.id" [class.client-card--hidden]="client.id === 'hidden'">
        <div class="client-card__logo-wrap">
          <a [href]="client.websiteUrl" target="_blank" rel="noopener">
            <img class="client-card__logo" [src]="client.logoUrl" [alt]="client.name">
          </a>
        </div>
        <div class="client-card__body">
          <h3 class="client-card__title">
            <a [href]="client.websiteUrl" target="_blank" rel="noopener">{{ client.title }}</a>
          </h3>
          <p class="client-card__desc">{{ client.description | shorten: 120 }}</p>
          <a [routerLink]="client.id" class="client-card__link">
            My work at {{ client.name }} <i class="fas fa-arrow-right"></i>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
